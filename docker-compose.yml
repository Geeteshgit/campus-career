services:
  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped

  user-service:
    build: ./services/user-service
    ports:
      - "5001:5001"
    env_file:
      - ./services/user-service/.env
    environment:
      NODE_ENV: production
    command: npm start
    depends_on:
      - rabbitmq
    restart: unless-stopped

  job-service:
    build: ./services/job-service
    ports:
      - "5002:5002"
    env_file:
      - ./services/job-service/.env
    environment:
      NODE_ENV: production
    command: npm start
    depends_on:
      - rabbitmq
    restart: unless-stopped

  message-service:
    build: ./services/message-service
    ports:
      - "5003:5003"
    env_file:
      - ./services/message-service/.env
    environment:
      NODE_ENV: production
    command: npm start
    depends_on:
      - rabbitmq
    restart: unless-stopped

  academic-configuration-service:
    build: ./services/academic-configuration-service
    ports:
      - "5004:5004"
    env_file:
      - ./services/academic-configuration-service/.env
    environment:
      NODE_ENV: production
    command: npm start
    depends_on:
      - rabbitmq
    restart: unless-stopped

  analytics-service:
    build: ./services/analytics-service
    ports:
      - "5005:5005"
    env_file:
      - ./services/analytics-service/.env
    environment:
      NODE_ENV: production
    command: npm start
    depends_on:
      - rabbitmq
    restart: unless-stopped